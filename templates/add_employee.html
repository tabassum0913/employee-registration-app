<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
    <h2 class="text-center mb-4">Add Employee</h2>

    <form method="POST" class="card p-4 bg-secondary">
        <input class="form-control mb-2" type="text" name="name" placeholder="Full Name" required>
        <input class="form-control mb-2" type="email" name="email" placeholder="Email" required>
        <input class="form-control mb-2" type="text" name="phone" placeholder="Phone" required>
        <input class="form-control mb-2" type="text" name="department" placeholder="Department" required>
        <input class="form-control mb-2" type="date" name="doj" required>
        <input class="form-control mb-3" type="text" name="role" placeholder="Role" required>

        <button class="btn btn-warning">Submit</button>
    </form>
</div>

</body>
</html>
